<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Transparent background -->
  <!-- Seal border -->
  <rect x="10" y="10" width="180" height="180" rx="8" fill="none" stroke="#E53935" stroke-width="6"/>
  <!-- Inner border -->
  <rect x="22" y="22" width="156" height="156" rx="4" fill="none" stroke="#E53935" stroke-width="2"/>
  <!-- Text: 龍偉銀月 (traditional) in red -->
  <text x="100" y="95" font-family="SimSun, Songti SC, serif" font-size="52" font-weight="bold" fill="#E53935" text-anchor="middle">龍偉</text>
  <text x="100" y="155" font-family="SimSun, Songti SC, serif" font-size="52" font-weight="bold" fill="#E53935" text-anchor="middle">銀月</text>
  <!-- Decorative corner accents in red -->
  <rect x="28" y="28" width="12" height="12" fill="#E53935"/>
  <rect x="160" y="28" width="12" height="12" fill="#E53935"/>
  <rect x="28" y="160" width="12" height="12" fill="#E53935"/>
  <rect x="160" y="160" width="12" height="12" fill="#E53935"/>
</svg>
