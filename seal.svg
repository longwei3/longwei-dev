<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Seal border -->
  <rect x="10" y="10" width="180" height="180" rx="8" fill="#E53935" stroke="#B71C1C" stroke-width="4"/>
  <!-- Inner border -->
  <rect x="20" y="20" width="160" height="160" rx="4" fill="none" stroke="#FFEBEE" stroke-width="2"/>
  <!-- Text: 龍偉銀月 (traditional) -->
  <text x="100" y="95" font-family="SimSun, Songti SC, serif" font-size="52" font-weight="bold" fill="#FFEBEE" text-anchor="middle">龍偉</text>
  <text x="100" y="155" font-family="SimSun, Songti SC, serif" font-size="52" font-weight="bold" fill="#FFEBEE" text-anchor="middle">銀月</text>
  <!-- Decorative corner accents -->
  <rect x="25" y="25" width="15" height="15" fill="#FFEBEE" opacity="0.6"/>
  <rect x="160" y="25" width="15" height="15" fill="#FFEBEE" opacity="0.6"/>
  <rect x="25" y="160" width="15" height="15" fill="#FFEBEE" opacity="0.6"/>
  <rect x="160" y="160" width="15" height="15" fill="#FFEBEE" opacity="0.6"/>
</svg>
