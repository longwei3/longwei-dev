<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9B5DE5"/>
      <stop offset="100%" style="stop-color:#5A189A"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Head -->
  <rect x="136" y="100" width="240" height="200" rx="30" fill="#F0E6FF"/>
  <!-- Eyes -->
  <circle cx="200" cy="180" r="35" fill="#00F5D4"/>
  <circle cx="312" cy="180" r="35" fill="#00F5D4"/>
  <circle cx="205" cy="175" r="15" fill="#2D3436"/>
  <circle cx="317" cy="175" r="15" fill="#2D3436"/>
  <!-- Eye shine -->
  <circle cx="212" cy="170" r="5" fill="white"/>
  <circle cx="324" cy="170" r="5" fill="white"/>
  <!-- Mouth -->
  <rect x="206" y="240" width="100" height="20" rx="10" fill="#5A189A"/>
  <!-- Antenna -->
  <line x1="256" y1="100" x2="256" y2="50" stroke="#F0E6FF" stroke-width="10" stroke-linecap="round"/>
  <circle cx="256" cy="40" r="15" fill="#00F5D4"/>
  <!-- Ears -->
  <rect x="116" y="180" width="20" height="60" rx="5" fill="#9B5DE5"/>
  <rect x="376" y="180" width="20" height="60" rx="5" fill="#9B5DE5"/>
  <!-- Body -->
  <rect x="156" y="320" width="200" height="120" rx="20" fill="#F0E6FF"/>
  <!-- Buttons -->
  <circle cx="196" cy="370" r="20" fill="#FF6B6B"/>
  <circle cx="256" cy="370" r="20" fill="#4ECDC4"/>
  <circle cx="316" cy="370" r="20" fill="#FFE66D"/>
  <!-- Arms -->
  <rect x="80" y="330" width="60" height="100" rx="20" fill="#9B5DE5"/>
  <rect x="372" y="330" width="60" height="100" rx="20" fill="#9B5DE5"/>
</svg>
