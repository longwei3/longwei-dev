<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D9FF"/>
      <stop offset="100%" style="stop-color:#0077B6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Wave -->
  <path d="M0 350 Q128 300 256 350 Q384 400 512 350 L512 512 L0 512 Z" fill="#023E8A" opacity="0.5"/>
  <path d="M0 380 Q128 330 256 380 Q384 430 512 380 L512 512 L0 512 Z" fill="#0077B6" opacity="0.7"/>
  <!-- Fish body -->
  <ellipse cx="256" cy="250" rx="100" ry="60" fill="#FFD93D"/>
  <!-- Tail -->
  <path d="M150 250 L100 200 L100 300 Z" fill="#FFD93D"/>
  <!-- Eye -->
  <circle cx="290" cy="235" r="15" fill="white"/>
  <circle cx="293" cy="235" r="8" fill="#2D3436"/>
  <circle cx="296" cy="232" r="3" fill="white"/>
  <!-- Smile -->
  <path d="M260 265 Q280 285 300 265" stroke="#E85D04" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Fin -->
  <path d="M256 200 Q280 160 240 180" fill="#FF9F1C"/>
  <!-- Bubbles -->
  <circle cx="380" cy="180" r="15" fill="white" opacity="0.5"/>
  <circle cx="410" cy="150" r="10" fill="white" opacity="0.4"/>
  <circle cx="350" cy="130" r="8" fill="white" opacity="0.3"/>
</svg>
