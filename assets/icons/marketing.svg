  <ellipse cx="230" cy="235" rx="8" ry="4" fill="#FFB8B8" opacity="0.6"/>
  <!-- Star decorations -->
  <polygon points="400,120 405,140 425,140 408,152 415,172 400,160 385,172 392,152 375,140 395,140" fill="#FFEAA7"/>
  <polygon points="100,150 103,162 115,162 105,170 109,182 100,174 91,182 95,170 85,162 97,162" fill="#FFEAA7"/>
