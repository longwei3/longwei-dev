<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7"/>
      <stop offset="100%" style="stop-color:#2D3436"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="80" fill="url(#bg)"/>
  <!-- Central node -->
  <circle cx="256" cy="256" r="50" fill="#F8F9FA" stroke="#6C5CE7" stroke-width="4"/>
  <!-- Network connections -->
  <line x1="256" y1="206" x2="256" y2="120" stroke="#A29BFE" stroke-width="4"/>
  <line x1="296" y1="286" x2="380" y2="320" stroke="#A29BFE" stroke-width="4"/>
  <line x1="216" y1="286" x2="132" y2="320" stroke="#A29BFE" stroke-width="4"/>
  <line x1="206" y1="256" x2="120" y2="256" stroke="#A29BFE" stroke-width="4"/>
  <line x1="306" y1="256" x2="392" y2="256" stroke="#A29BFE" stroke-width="4"/>
  <!-- Satellite nodes -->
  <circle cx="256" cy="100" r="30" fill="#55EFC4"/>
  <circle cx="400" cy="340" r="30" fill="#00CEC9"/>
  <circle cx="112" cy="340" r="30" fill="#FFEAA7"/>
  <circle cx="100" cy="256" r="30" fill="#FF6B6B"/>
  <circle cx="412" cy="256" r="30" fill="#FD79A8"/>
  <!-- Node faces -->
  <circle cx="256" cy="95" r="5" fill="#2D3436"/>
