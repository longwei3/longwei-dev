  <circle cx="112" cy="335" r="5" fill="#2D3436"/>
  <circle cx="100" cy="251" r="5" fill="#2D3436"/>
  <circle cx="412" cy="251" r="5" fill="#2D3436"/>
  <!-- Central face -->
  <circle cx="240" cy="250" r="6" fill="#2D3436"/>
  <circle cx="272" cy="250" r="6" fill="#2D3436"/>
  <circle cx="256" cy="268" r="8" fill="none" stroke="#2D3436" stroke-width="3"/>
  <!-- Blush on center -->
  <ellipse cx="230" cy="265" rx="6" ry="3" fill="#FFB8B8" opacity="0.5"/>
  <ellipse cx="282" cy="265" rx="6" ry="3" fill="#FFB8B8" opacity="0.5"/>
  <!-- DApp text -->
  <text x="256" y="450" font-family="Arial Black, sans-serif" font-size="28" fill="#A29BFE" text-anchor="middle">DApp</text>
  <!-- Decorative stars -->
  <polygon points="180,120 183,130 195,130 186,138 190,150 180,142 170,150 174,138 165,130 177,130" fill="#FFEAA7"/>
  <polygon points="340,140 343,150 355,150 346,158 350,170 340,162 330,170 334,158 325,150 337,150" fill="#55EFC4"/>
